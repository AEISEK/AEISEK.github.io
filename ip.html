
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b12;--card:#0f1520;--card2:#131b28;--border:#1c2840;--border2:#243350;
  --accent:#5b8dee;--accent2:#9b5de5;--green:#0fd6a2;--amber:#f4a93a;--red:#f06570;--cyan:#22d3ee;
  --text:#dde6f5;--text2:#8494aa;--text3:#4d5f75;
  --f:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
body{background:var(--bg);font-family:var(--f);color:var(--text);min-height:100vh}
.stars{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--op,.3)}50%{opacity:.05}}
.glow{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(100px);opacity:.08}
.g1{width:500px;height:500px;background:radial-gradient(circle,var(--accent),transparent);top:-150px;right:-100px}
.g2{width:400px;height:400px;background:radial-gradient(circle,var(--accent2),transparent);bottom:-100px;left:-80px}
.g3{width:300px;height:300px;background:radial-gradient(circle,var(--green),transparent);top:40%;left:30%;opacity:.05}
.wrap{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:2.5rem 1.25rem 4rem}
.badge{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(91,141,238,.25);background:rgba(91,141,238,.07);border-radius:100px;padding:5px 14px 5px 10px;font-size:11.5px;color:var(--accent);letter-spacing:.06em;font-weight:500;margin-bottom:1.75rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero{position:relative;border-radius:20px;padding:2rem 2rem 1.75rem;margin-bottom:1rem;overflow:hidden;border:1px solid var(--border2);background:linear-gradient(135deg,#0f1c30 0%,#0d1522 60%,#0a1020 100%)}
.hero-line{position:absolute;inset:0;background:linear-gradient(135deg,rgba(91,141,238,.08) 0%,rgba(155,93,229,.05) 50%,transparent 100%);pointer-events:none}
.hero-corner{position:absolute;top:0;right:0;width:180px;height:180px;background:radial-gradient(circle at top right,rgba(91,141,238,.12),transparent 70%);pointer-events:none}
.hero-label{font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem;font-weight:500}
.hero-ip{font-family:var(--fm);font-size:clamp(22px,5vw,34px);font-weight:600;color:#fff;letter-spacing:-.02em;line-height:1;margin-bottom:.5rem}
.hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:.75rem}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:3px 10px;border-radius:100px;border:1px solid;font-weight:500}
.chip-blue{background:rgba(91,141,238,.1);border-color:rgba(91,141,238,.25);color:var(--accent)}
.chip-green{background:rgba(15,214,162,.08);border-color:rgba(15,214,162,.2);color:var(--green)}
.copy{position:absolute;top:1.5rem;right:1.5rem;background:rgba(91,141,238,.1);border:1px solid rgba(91,141,238,.25);border-radius:10px;padding:7px 13px;color:var(--accent);font-size:12px;font-family:var(--f);cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.copy:hover{background:rgba(91,141,238,.2)}
.copy .ti{font-size:14px}
.country-banner{display:flex;align-items:center;gap:1rem;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.flag-wrap{width:56px;height:56px;border-radius:14px;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.country-name{font-size:22px;font-weight:600;color:#fff;letter-spacing:-.02em}
.country-sub{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--fm)}
.currency-block{margin-left:auto;text-align:right}
.currency-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.currency-val{font-size:22px;font-weight:600;color:var(--amber);font-family:var(--fm)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:1.1rem 1.25rem;transition:border-color .2s,background .2s;cursor:default}
.card:hover{border-color:var(--border2);background:var(--card2)}
.card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:.75rem;font-size:18px}
.ci-blue{background:rgba(91,141,238,.12);color:var(--accent)}
.ci-purple{background:rgba(155,93,229,.12);color:#b07ef8}
.ci-green{background:rgba(15,214,162,.1);color:var(--green)}
.ci-amber{background:rgba(244,169,58,.1);color:var(--amber)}
.ci-red{background:rgba(240,101,112,.09);color:var(--red)}
.ci-cyan{background:rgba(34,211,238,.09);color:var(--cyan)}
.card-label{font-size:10.5px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:4px}
.card-val{font-size:15px;font-weight:500;color:var(--text);line-height:1.3}
.mono{font-family:var(--fm);font-size:13px}
.isp-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:15px;padding:1rem 1.25rem;margin-bottom:10px}
.isp-icon{width:40px;height:40px;border-radius:11px;background:rgba(91,141,238,.1);border:1px solid rgba(91,141,238,.2);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent);flex-shrink:0}
.isp-label{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.isp-val{font-size:14px;font-weight:500;color:var(--text)}
.coords-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.map-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;background:linear-gradient(135deg,rgba(91,141,238,.13),rgba(155,93,229,.13));border:1px solid rgba(91,141,238,.2);border-radius:15px;color:var(--accent);font-size:14px;font-weight:500;font-family:var(--f);cursor:pointer;text-decoration:none;transition:.2s;letter-spacing:.01em}
.map-btn:hover{background:linear-gradient(135deg,rgba(91,141,238,.22),rgba(155,93,229,.22));border-color:rgba(91,141,238,.4)}
.map-btn .ti{font-size:20px}
.refresh-wrap{display:flex;justify-content:center;margin-top:1.75rem}
.refresh-btn{background:transparent;border:1px solid var(--border2);border-radius:100px;padding:8px 20px;color:var(--text2);font-size:12px;font-family:var(--f);cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.refresh-btn:hover{border-color:var(--text3);color:var(--text)}
.refresh-btn .ti{font-size:14px}
.load{text-align:center;padding:4rem 1rem}
.ring{width:44px;height:44px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.load-t{color:var(--text2);font-size:13px}
.err{background:rgba(240,101,112,.07);border:1px solid rgba(240,101,112,.18);border-radius:15px;padding:1.5rem;text-align:center;color:var(--red);font-size:13.5px;line-height:1.6}
.sr-only{position:absolute;width:1px;height:1px;clip:rect(0,0,0,0);overflow:hidden}
</style>

<div class="stars" id="stars"></div>
<div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>

<div class="wrap">
  <h2 class="sr-only">IP геолокация</h2>
  <div><div class="badge"><span class="dot"></span> LIVE · Автоопределение</div></div>
  <div id="root"><div class="load"><div class="ring"></div><p class="load-t">Определяем ваш IP...</p></div></div>
  <div class="refresh-wrap"><button class="refresh-btn" onclick="loadData()"><i class="ti ti-refresh"></i> Обновить данные</button></div>
</div>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = Math.random()*2+.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${.1+Math.random()*.5}`;
  starsEl.appendChild(s);
}
function flag(cc){if(!cc)return'🌐';return cc.toUpperCase().replace(/./g,c=>String.fromCodePoint(0x1F1E6-65+c.charCodeAt(0)))}
function copyIP(ip,btn){
  navigator.clipboard.writeText(ip).then(()=>{
    const o=btn.innerHTML;
    btn.innerHTML='<i class="ti ti-check"></i> Скопировано';
    btn.style.cssText='background:rgba(15,214,162,.15);border-color:rgba(15,214,162,.35);color:#0fd6a2';
    setTimeout(()=>{btn.innerHTML=o;btn.style.cssText=''},1600);
  });
}
async function fetchGeo(){
  try{const r=await fetch('https://ip-api.com/json/?fields=status,country,countryCode,regionName,city,zip,lat,lon,timezone,isp,org,as,query,continent');const d=await r.json();if(d.status==='success')return{ip:d.query,country_name:d.country,country_code:d.countryCode,region:d.regionName,city:d.city,postal:d.zip,latitude:d.lat,longitude:d.lon,timezone:d.timezone,org:d.org||d.isp,asn:d.as,currency:null,version:'IPv4',continent_code:d.continent?.slice(0,2)||''}}catch(e){}
  try{const r=await fetch('https://ipwho.is/');const d=await r.json();if(d.success)return{ip:d.ip,country_name:d.country,country_code:d.country_code,region:d.region,city:d.city,postal:d.postal,latitude:d.latitude,longitude:d.longitude,timezone:d.timezone?.id,org:d.connection?.org,asn:d.connection?.asn?'AS'+d.connection.asn:'',currency:d.currency?.code,version:d.type,continent_code:d.continent_code}}catch(e){}
  try{const r=await fetch('https://freeipapi.com/api/json');const d=await r.json();if(d.ipAddress)return{ip:d.ipAddress,country_name:d.countryName,country_code:d.countryCode,region:d.regionName,city:d.cityName,postal:d.zipCode,latitude:d.latitude,longitude:d.longitude,timezone:d.timeZone,org:null,asn:null,currency:d.currency?.code,version:d.ipVersion===6?'IPv6':'IPv4',continent_code:''}}catch(e){}
  throw new Error('Все серверы недоступны. Проверьте соединение.');
}
async function loadData(){
  document.getElementById('root').innerHTML='<div class="load"><div class="ring"></div><p class="load-t">Определяем ваш IP...</p></div>';
  try{
    const d=await fetchGeo();
    const f=flag(d.country_code);
    const lat=d.latitude?(+d.latitude).toFixed(5):'—';
    const lon=d.longitude?(+d.longitude).toFixed(5):'—';
    const mapsUrl=d.latitude&&d.longitude?`https://www.openstreetmap.org/?mlat=${d.latitude}&mlon=${d.longitude}&zoom=13`:null;
    const isp=(d.org||'').replace(/^AS\d+\s*/,'')||'—';
    const cur=d.currency||'—';
    document.getElementById('root').innerHTML=`
      <div class="hero">
        <div class="hero-line"></div><div class="hero-corner"></div>
        <button class="copy" onclick="copyIP('${d.ip}',this)"><i class="ti ti-copy"></i> Копировать</button>
        <div class="hero-label">Ваш IP-адрес</div>
        <div class="hero-ip">${d.ip||'—'}</div>
        <div class="hero-meta">
          <span class="chip chip-blue"><i class="ti ti-shield-check" style="font-size:12px"></i> ${d.version||'IPv4'}</span>
          ${d.asn?`<span class="chip chip-green"><i class="ti ti-server" style="font-size:12px"></i> ${d.asn.split(' ')[0]}</span>`:''}
        </div>
      </div>
      <div class="country-banner">
        <div class="flag-wrap">${f}</div>
        <div>
          <div class="country-name">${d.country_name||'—'}</div>
          <div class="country-sub">${d.country_code||''} · ${d.continent_code||''}</div>
        </div>
        <div class="currency-block">
          <div class="currency-label">Валюта</div>
          <div class="currency-val">${cur}</div>
        </div>
      </div>
      <div class="grid">
        <div class="card">
          <div class="card-icon ci-blue"><i class="ti ti-map-2"></i></div>
          <div class="card-label">Регион</div>
          <div class="card-val">${d.region||'—'}</div>
        </div>
        <div class="card">
          <div class="card-icon ci-purple"><i class="ti ti-building-skyscraper"></i></div>
          <div class="card-label">Город</div>
          <div class="card-val" style="font-size:18px;font-weight:600;color:#fff">${d.city||'—'}</div>
        </div>
        <div class="card">
          <div class="card-icon ci-amber"><i class="ti ti-clock"></i></div>
          <div class="card-label">Часовой пояс</div>
          <div class="card-val" style="font-size:13px">${d.timezone||'—'}</div>
        </div>
        <div class="card">
          <div class="card-icon ci-green"><i class="ti ti-mailbox"></i></div>
          <div class="card-label">Индекс</div>
          <div class="card-val mono">${d.postal||'—'}</div>
        </div>
      </div>
      <div class="coords-row">
        <div class="card">
          <div class="card-icon ci-cyan"><i class="ti ti-arrows-vertical"></i></div>
          <div class="card-label">Широта</div>
          <div class="card-val mono">${lat}</div>
        </div>
        <div class="card">
          <div class="card-icon ci-red"><i class="ti ti-arrows-horizontal"></i></div>
          <div class="card-label">Долгота</div>
          <div class="card-val mono">${lon}</div>
        </div>
      </div>
      <div class="isp-row">
        <div class="isp-icon"><i class="ti ti-wifi"></i></div>
        <div>
          <div class="isp-label">Провайдер</div>
          <div class="isp-val">${isp}</div>
        </div>
      </div>
      ${mapsUrl?`<a class="map-btn" href="${mapsUrl}" target="_blank" rel="noopener"><i class="ti ti-map-pin"></i> Открыть на карте</a>`:''}
    `;
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="err"><i class="ti ti-alert-triangle" style="font-size:22px;display:block;margin-bottom:10px"></i>${e.message}</div>`;
  }
}
loadData();
</script>
