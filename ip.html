
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #06080f; --surface: #0d1117; --card: #111822; --card-border: #1e2d42;
  --accent: #4f8ef7; --accent2: #7c3aed; --text: #e8edf5; --muted: #5a6a80;
  --subtle: #1e2d42; --success: #22d3a0;
  --font-display: 'Space Grotesk', sans-serif; --font-mono: 'Space Mono', monospace;
}
body { background: var(--bg); font-family: var(--font-display); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.canvas { position: relative; padding: 2.5rem 1.5rem 3rem; max-width: 680px; margin: 0 auto; }
.glow-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; z-index: 0; }
.glow-blob.a { width: 400px; height: 400px; background: var(--accent); top: -100px; right: -100px; }
.glow-blob.b { width: 300px; height: 300px; background: var(--accent2); bottom: 0; left: -80px; }
.inner { position: relative; z-index: 1; }
.header { text-align: center; margin-bottom: 2.5rem; }
.eyebrow { display: inline-flex; align-items: center; gap: 6px; background: rgba(79,142,247,0.1); border: 0.5px solid rgba(79,142,247,0.3); border-radius: 100px; padding: 4px 12px; font-size: 11px; letter-spacing: 0.1em; color: var(--accent); font-weight: 500; text-transform: uppercase; margin-bottom: 1rem; }
.pulse { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.6)} }
h1 { font-size: 28px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; line-height: 1.2; }
h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.ip-hero { background: var(--card); border: 0.5px solid var(--card-border); border-radius: 16px; padding: 1.5rem 1.75rem; margin-bottom: 1rem; position: relative; overflow: hidden; }
.ip-hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(79,142,247,0.05) 0%, transparent 60%); pointer-events: none; }
.ip-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.ip-tag { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.ip-num { font-family: var(--font-mono); font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; line-height: 1; }
.ip-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
.copy-btn { background: rgba(79,142,247,0.1); border: 0.5px solid rgba(79,142,247,0.3); border-radius: 10px; padding: 8px 14px; color: var(--accent); font-size: 12px; font-family: var(--font-display); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
.copy-btn:hover { background: rgba(79,142,247,0.2); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.tile { background: var(--card); border: 0.5px solid var(--card-border); border-radius: 14px; padding: 1rem 1.25rem; transition: border-color 0.2s; }
.tile:hover { border-color: rgba(79,142,247,0.3); }
.tile-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 16px; }
.icon-blue { background: rgba(79,142,247,0.12); color: var(--accent); }
.icon-purple { background: rgba(124,58,237,0.12); color: #a78bfa; }
.icon-green { background: rgba(34,211,160,0.1); color: var(--success); }
.icon-amber { background: rgba(245,158,11,0.1); color: #fbbf24; }
.icon-red { background: rgba(239,68,68,0.08); color: #f87171; }
.icon-cyan { background: rgba(6,182,212,0.1); color: #22d3ee; }
.tile-label { font-size: 11px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 4px; }
.tile-value { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
.tile-value.mono { font-family: var(--font-mono); font-size: 13px; }
.country-tile { background: var(--card); border: 0.5px solid var(--card-border); border-radius: 14px; padding: 1rem 1.25rem; grid-column: span 2; display: flex; align-items: center; gap: 16px; }
.flag-circle { width: 52px; height: 52px; border-radius: 50%; background: var(--subtle); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.country-name { font-size: 20px; font-weight: 600; color: var(--text); }
.country-code { font-size: 12px; color: var(--muted); font-family: var(--font-mono); margin-top: 2px; }
.map-btn { width: 100%; background: linear-gradient(135deg, rgba(79,142,247,0.15), rgba(124,58,237,0.15)); border: 0.5px solid rgba(79,142,247,0.25); border-radius: 14px; padding: 14px; color: var(--accent); font-size: 14px; font-family: var(--font-display); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; font-weight: 500; text-decoration: none; margin-top: 1rem; }
.map-btn:hover { background: linear-gradient(135deg, rgba(79,142,247,0.25), rgba(124,58,237,0.25)); border-color: rgba(79,142,247,0.5); }
.refresh-row { display: flex; justify-content: center; margin-top: 1.5rem; }
.refresh-btn { background: transparent; border: 0.5px solid var(--card-border); border-radius: 100px; padding: 8px 18px; color: var(--muted); font-size: 12px; font-family: var(--font-display); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
.refresh-btn:hover { border-color: var(--muted); color: var(--text); }
.loading-state { text-align: center; padding: 3rem 1rem; }
.loader-ring { width: 40px; height: 40px; border: 2px solid var(--subtle); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--muted); font-size: 14px; }
.error-state { background: rgba(239,68,68,0.08); border: 0.5px solid rgba(239,68,68,0.2); border-radius: 14px; padding: 1.25rem; text-align: center; color: #f87171; font-size: 14px; }
.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }
</style>

<div class="glow-blob a"></div>
<div class="glow-blob b"></div>
<div class="canvas">
  <h2 class="sr-only">Определитель IP-адреса и геолокации</h2>
  <div class="inner">
    <div class="header">
      <div class="eyebrow"><span class="pulse"></span> Live detection</div>
      <h1>Ваш <span>IP и геолокация</span></h1>
    </div>
    <div id="root">
      <div class="loading-state"><div class="loader-ring"></div><p class="loading-text">Определяем ваш IP-адрес...</p></div>
    </div>
    <div class="refresh-row">
      <button class="refresh-btn" onclick="loadData()"><i class="ti ti-refresh" style="font-size:14px"></i> Обновить</button>
    </div>
  </div>
</div>

<script>
function getFlagEmoji(cc) {
  if (!cc) return '🌐';
  return cc.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0)));
}
function copyIP(ip, btn) {
  navigator.clipboard.writeText(ip).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check" style="font-size:13px"></i> Скопировано';
    btn.style.cssText = 'background:rgba(34,211,160,0.15);border-color:rgba(34,211,160,0.4);color:#22d3a0';
    setTimeout(() => { btn.innerHTML = orig; btn.style.cssText = ''; }, 1500);
  });
}

// Try multiple CORS-friendly APIs in sequence
async function fetchGeoData() {
  // API 1: ip-api.com (no key needed, CORS OK, HTTP only — use http if on http site)
  try {
    const r = await fetch('https://ip-api.com/json/?fields=status,message,country,countryCode,regionName,city,zip,lat,lon,timezone,isp,org,as,query,continent');
    const d = await r.json();
    if (d.status === 'success') {
      return {
        ip: d.query, country_name: d.country, country_code: d.countryCode,
        region: d.regionName, city: d.city, postal: d.zip,
        latitude: d.lat, longitude: d.lon, timezone: d.timezone,
        org: d.org || d.isp, asn: d.as, currency: null, version: 'IPv4',
        continent_code: d.continent ? d.continent.slice(0,2) : ''
      };
    }
  } catch(e) {}

  // API 2: ipwho.is (CORS OK, free)
  try {
    const r = await fetch('https://ipwho.is/');
    const d = await r.json();
    if (d.success) {
      return {
        ip: d.ip, country_name: d.country, country_code: d.country_code,
        region: d.region, city: d.city, postal: d.postal,
        latitude: d.latitude, longitude: d.longitude, timezone: d.timezone?.id,
        org: d.connection?.org, asn: d.connection?.asn ? 'AS'+d.connection.asn : '',
        currency: d.currency?.code, version: d.type, continent_code: d.continent_code
      };
    }
  } catch(e) {}

  // API 3: freeipapi.com
  try {
    const r = await fetch('https://freeipapi.com/api/json');
    const d = await r.json();
    if (d.ipAddress) {
      return {
        ip: d.ipAddress, country_name: d.countryName, country_code: d.countryCode,
        region: d.regionName, city: d.cityName, postal: d.zipCode,
        latitude: d.latitude, longitude: d.longitude, timezone: d.timeZone,
        org: null, asn: null, currency: d.currency?.code, version: d.ipVersion === 6 ? 'IPv6' : 'IPv4',
        continent_code: d.continent ? d.continent.slice(0,2) : ''
      };
    }
  } catch(e) {}

  throw new Error('Все серверы недоступны. Проверьте интернет-соединение.');
}

async function loadData() {
  document.getElementById('root').innerHTML = `<div class="loading-state"><div class="loader-ring"></div><p class="loading-text">Определяем ваш IP-адрес...</p></div>`;
  try {
    const d = await fetchGeoData();
    const flag = getFlagEmoji(d.country_code);
    const lat = d.latitude ? (+d.latitude).toFixed(5) : '—';
    const lon = d.longitude ? (+d.longitude).toFixed(5) : '—';
    const mapsUrl = d.latitude && d.longitude ? `https://www.openstreetmap.org/?mlat=${d.latitude}&mlon=${d.longitude}&zoom=13` : null;
    const isp = (d.org || '').replace(/^AS\d+\s*/, '') || '—';
    const currency = d.currency || '—';
    const version = d.version || 'IPv4';

    document.getElementById('root').innerHTML = `
      <div class="ip-hero">
        <div class="ip-row">
          <div class="ip-left">
            <div class="ip-tag">IP-адрес</div>
            <div class="ip-num">${d.ip || '—'}</div>
            <div class="ip-sub">${version} · ${d.asn || ''}</div>
          </div>
          <button class="copy-btn" onclick="copyIP('${d.ip}', this)">
            <i class="ti ti-copy" style="font-size:13px"></i> Копировать
          </button>
        </div>
      </div>
      <div class="country-tile" style="margin-bottom:10px">
        <div class="flag-circle">${flag}</div>
        <div style="flex:1">
          <div class="country-name">${d.country_name || '—'}</div>
          <div class="country-code">${d.country_code || ''} · ${d.continent_code || ''}</div>
        </div>
        <div style="text-align:right">
          <div class="tile-label">Валюта</div>
          <div class="tile-value" style="font-size:18px;font-weight:600;color:var(--accent)">${currency}</div>
        </div>
      </div>
      <div class="grid">
        <div class="tile">
          <div class="tile-icon icon-blue"><i class="ti ti-map-2"></i></div>
          <div class="tile-label">Регион</div>
          <div class="tile-value">${d.region || '—'}</div>
        </div>
        <div class="tile">
          <div class="tile-icon icon-purple"><i class="ti ti-building-skyscraper"></i></div>
          <div class="tile-label">Город</div>
          <div class="tile-value" style="font-size:18px">${d.city || '—'}</div>
        </div>
        <div class="tile">
          <div class="tile-icon icon-amber"><i class="ti ti-clock"></i></div>
          <div class="tile-label">Часовой пояс</div>
          <div class="tile-value" style="font-size:13px">${d.timezone || '—'}</div>
        </div>
        <div class="tile">
          <div class="tile-icon icon-green"><i class="ti ti-mail-pin"></i></div>
          <div class="tile-label">Почтовый индекс</div>
          <div class="tile-value mono">${d.postal || '—'}</div>
        </div>
        <div class="tile">
          <div class="tile-icon icon-cyan"><i class="ti ti-current-location"></i></div>
          <div class="tile-label">Широта</div>
          <div class="tile-value mono">${lat}</div>
        </div>
        <div class="tile">
          <div class="tile-icon icon-red"><i class="ti ti-current-location"></i></div>
          <div class="tile-label">Долгота</div>
          <div class="tile-value mono">${lon}</div>
        </div>
      </div>
      <div class="tile">
        <div class="tile-icon icon-blue" style="width:28px;height:28px;font-size:14px;border-radius:7px"><i class="ti ti-wifi"></i></div>
        <div class="tile-label">Провайдер</div>
        <div class="tile-value" style="font-size:14px">${isp}</div>
      </div>
      ${mapsUrl ? `<a class="map-btn" href="${mapsUrl}" target="_blank" rel="noopener"><i class="ti ti-map-pin" style="font-size:18px"></i> Открыть моё местоположение на карте</a>` : ''}
    `;
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="error-state"><i class="ti ti-alert-triangle" style="font-size:20px;display:block;margin-bottom:8px"></i>${e.message}</div>`;
  }
}
loadData();
</script>
