<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мировое Время • Cosmic Flow</title>

  <!-- Favicon: неоновый циферблат в космическом стиле -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><filter id='glow' x='-50%' y='-50%' width='200%' height='200%'><feGaussianBlur stdDeviation='3.5' result='coloredBlur'/><feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><circle cx='50' cy='50' r='44' fill='none' stroke='%2300eaff' stroke-width='6' filter='url(%23glow)' opacity='0.92'/><circle cx='50' cy='50' r='5' fill='%2300eaff' filter='url(%23glow)'/><path d='M50 10 L50 30 M50 90 L50 70 M10 50 L30 50 M90 50 L70 50 M32 32 L44 44 M68 68 L56 56 M32 68 L44 56 M68 32 L56 44' stroke='%2300eaff' stroke-width='9' stroke-linecap='round' filter='url(%23glow)' opacity='0.88'/></svg>" type="image/svg+xml">

  <!-- Для мобильных устройств (Apple Touch Icon) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='90' r='82' fill='none' stroke='%2300eaff' stroke-width='12' opacity='0.9'/><path d='M90 25 L90 55 M90 155 L90 125 M25 90 L55 90 M155 90 L125 90' stroke='%2300eaff' stroke-width='20' stroke-linecap='round' opacity='0.85'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;600&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #05030f;
      --accent: #00eaff;
      --accent-glow: #00eaff33;
      --accent-soft: #40f0ff;
      --text: #f0faff;
      --text-dim: #b0d8ff;
      --glass: rgba(12, 18, 45, 0.38);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
      overflow-x: hidden;
      position: relative;
      background: radial-gradient(ellipse at 20% 80%, #0a0022 0%, #000814 60%);
    }

    canvas#bg-particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      padding: 4rem 1.5rem 6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3.2rem, 9vw, 7.2rem);
      font-weight: 300;
      letter-spacing: -4px;
      background: linear-gradient(90deg, #a0f8ff, #00eaff, #a0f8ff, #40d0ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientFlow 12s ease infinite;
      text-shadow: 0 0 60px #00eaff44, 0 0 100px #00eaff22;
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: 1.3rem;
      color: var(--text-dim);
      margin-bottom: 4.5rem;
      letter-spacing: 1px;
      opacity: 0.75;
    }

    .clocks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 2.4rem;
      width: 100%;
      max-width: 1280px;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: 24px;
      border: 1px solid rgba(0, 234, 255, 0.16);
      padding: 2.4rem 2rem;
      box-shadow: 
        0 12px 60px rgba(0,0,0,0.7),
        inset 0 0 40px rgba(0, 234, 255, 0.08);
      transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 30% 20%, rgba(0,234,255,0.12) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .card:hover::before,
    .card:hover {
      opacity: 1;
      transform: translateY(-12px) scale(1.02);
      box-shadow: 
        0 30px 80px rgba(0, 234, 255, 0.25),
        inset 0 0 60px rgba(0, 234, 255, 0.12);
      border-color: rgba(0, 234, 255, 0.35);
    }

    .city {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.1rem;
      font-weight: 400;
      color: var(--accent-soft);
      margin-bottom: 0.3rem;
      letter-spacing: 1px;
      text-shadow: 0 0 16px var(--accent-glow);
    }

    .zone {
      font-size: 0.98rem;
      color: #80c0ff;
      opacity: 0.7;
      margin-bottom: 1.6rem;
    }

    .time {
      font-size: clamp(4.2rem, 11vw, 7rem);
      font-weight: 400;
      letter-spacing: -5px;
      color: white;
      text-shadow: 
        0 0 30px #00eaff88,
        0 0 70px #00eaff44,
        0 0 120px #00eaff22;
      line-height: 0.92;
    }

    .seconds {
      font-size: 0.48em;
      vertical-align: 0.4em;
      color: var(--accent);
      opacity: 0.92;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 0.92; transform: scale(1); }
      50%     { opacity: 0.55; transform: scale(1.06); }
    }

    .date {
      margin-top: 1.4rem;
      font-size: 1.15rem;
      color: #a0d0ff;
      opacity: 0.82;
    }

    .footer {
      margin-top: 6rem;
      font-size: 0.96rem;
      color: #506080;
      text-align: center;
      letter-spacing: 0.5px;
    }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (max-width: 700px) {
      h1          { font-size: 3.8rem; }
      .clocks     { gap: 1.8rem; }
      .card       { padding: 2rem 1.6rem; }
      .time       { font-size: 5.2rem; }
    }
  </style>
</head>
<body>

<canvas id="bg-particles"></canvas>

<div class="container">
  <h1>Мировое Время</h1>
  <div class="subtitle">Космический поток • Live</div>

  <div class="clocks">

    <div class="card">
      <div class="city">НЬЮ-ЙОРК</div>
      <div class="zone">UTC−5  •  EST</div>
      <div class="time" id="t-utc5">--:--<span class="seconds">--</span></div>
      <div class="date" id="d-utc5">—</div>
    </div>

    <div class="card">
      <div class="city">МОСКВА</div>
      <div class="zone">MSK  •  UTC+3</div>
      <div class="time" id="t-msk">--:--<span class="seconds">--</span></div>
      <div class="date" id="d-msk">—</div>
    </div>

    <div class="card">
      <div class="city">ТОКИО</div>
      <div class="zone">JST  •  UTC+9</div>
      <div class="time" id="t-tokyo">--:--<span class="seconds">--</span></div>
      <div class="date" id="d-tokyo">—</div>
    </div>

  </div>

  <div class="footer">время синхронизировано • обновление каждую секунду</div>
</div>

<script>
// ─── Particles background ────────────────────────────────────────
const canvas = document.getElementById('bg-particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 1.6 + 0.4,
    speed: Math.random() * 0.3 + 0.05,
    alpha: Math.random() * 0.5 + 0.2
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0, 234, 255, ${p.alpha})`;
    ctx.fill();

    p.y -= p.speed;
    if (p.y < -10) {
      p.y = canvas.height + 10;
      p.x = Math.random() * canvas.width;
    }
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ─── Clock logic ─────────────────────────────────────────────────
function updateClocks() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;

  const zones = [
    { id: 'utc5',  offset: -5 },
    { id: 'msk',   offset: +3 },
    { id: 'tokyo', offset: +9 }
  ];

  zones.forEach(z => {
    const d = new Date(utc + z.offset * 3600000);
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    const s = String(d.getSeconds()).padStart(2,'0');

    document.getElementById(`t-${z.id}`).innerHTML = `${h}:${m}<span class="seconds">${s}</span>`;

    const dateStr = d.toLocaleDateString('ru-RU', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
    document.getElementById(`d-${z.id}`).textContent = 
      dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
  });
}

updateClocks();
setInterval(updateClocks, 1000);
</script>

</body>
</html>
