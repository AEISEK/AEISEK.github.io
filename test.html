<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тест скорости интернета</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacOSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #a5b4fc;
      margin: 0.4em 0 0.8em;
    }
    .container {
      background: rgba(30, 30, 60, 0.6);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .speed {
      font-size: 3.8rem;
      font-weight: bold;
      margin: 0.3em 0;
      color: #c7d2fe;
    }
    .unit {
      font-size: 1.4rem;
      color: #94a3b8;
    }
    .label {
      font-size: 1.1rem;
      color: #cbd5e1;
      margin: 0.4em 0 1.2em;
    }
    progress {
      width: 100%;
      height: 10px;
      margin: 1.5em 0 0.8em;
      border-radius: 5px;
      background: #1e293b;
    }
    progress::-webkit-progress-bar {
      background: #1e293b;
      border-radius: 5px;
    }
    progress::-webkit-progress-value {
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 5px;
    }
    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      margin: 1.5em 0 1em;
      transition: all 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #status {
      min-height: 1.4em;
      color: #94a3b8;
      margin: 0.8em 0;
    }
    .small {
      font-size: 0.95rem;
      color: #64748b;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Тест скорости</h1>
  
  <div id="download-section">
    <div class="label">Скорость скачивания</div>
    <div class="speed" id="download-speed">--</div>
    <div class="unit">Мбит/с</div>
  </div>

  <div id="upload-section" style="margin-top: 1.8rem;">
    <div class="label">Скорость загрузки</div>
    <div class="speed" id="upload-speed">--</div>
    <div class="unit">Мбит/с</div>
  </div>

  <progress id="progress" value="0" max="100"></progress>

  <button id="startBtn">Начать тест</button>
  <div id="status"></div>

  <div class="small">
    Тест использует файлы ~25–40 МБ • Результаты приблизительные
  </div>
</div>

<script>
// ──────────────────────────────────────────────
//   Простой speedtest без внешних серверов
// ──────────────────────────────────────────────

const FILE_URL = "https://speed.cloudflare.com/__down?bytes=25000000"; // ~25 MB
const UPLOAD_URL = "https://speed.cloudflare.com/__up";
const DOWNLOAD_TIMEOUT = 12000;   // макс 12 сек на скачивание
const UPLOAD_SIZE = 10 * 1024 * 1024;  // 10 МБ

const startBtn = document.getElementById("startBtn");
const statusEl = document.getElementById("status");
const dlSpeedEl = document.getElementById("download-speed");
const ulSpeedEl = document.getElementById("upload-speed");
const progress = document.getElementById("progress");

let isTesting = false;

startBtn.onclick = async () => {
  if (isTesting) return;
  isTesting = true;
  startBtn.disabled = true;
  statusEl.textContent = "Подготовка...";
  dlSpeedEl.textContent = "--";
  ulSpeedEl.textContent = "--";
  progress.value = 0;

  try {
    // 1. Скачивание
    statusEl.textContent = "Измеряем скорость скачивания...";
    const dlSpeed = await measureDownload();
    dlSpeedEl.textContent = dlSpeed.toFixed(1);

    progress.value = 45;

    // 2. Загрузка
    statusEl.textContent = "Измеряем скорость загрузки...";
    const ulSpeed = await measureUpload();
    ulSpeedEl.textContent = ulSpeed.toFixed(1);

    progress.value = 100;
    statusEl.textContent = "Готово!";
  } catch (err) {
    statusEl.textContent = "Ошибка: " + err.message;
    console.error(err);
  } finally {
    isTesting = false;
    startBtn.disabled = false;
  }
};


async function measureDownload() {
  const start = performance.now();
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), DOWNLOAD_TIMEOUT);

  const res = await fetch(FILE_URL, { 
    cache: "no-store", 
    signal: controller.signal 
  });

  if (!res.ok) throw new Error("Не удалось загрузить тестовый файл");

  const blob = await res.blob();
  clearTimeout(timeoutId);

  const duration = (performance.now() - start) / 1000; // секунды
  const bytes = blob.size;
  const mbits = (bytes * 8) / (duration * 1000000);

  return mbits;
}


async function measureUpload() {
  const data = new Uint8Array(UPLOAD_SIZE).fill(65); // заполняем буквами 'A'
  const blob = new Blob([data]);

  const start = performance.now();

  const formData = new FormData();
  formData.append("file", blob, "test.bin");

  const res = await fetch(UPLOAD_URL, {
    method: "POST",
    body: formData,
    cache: "no-store"
  });

  if (!res.ok) throw new Error("Ошибка сервера при загрузке");

  const duration = (performance.now() - start) / 1000;
  const mbits = (UPLOAD_SIZE * 8) / (duration * 1000000);

  return mbits;
}
</script>
</body>
</html>
